<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Movie Recommender</h2>

<input id="movie" placeholder="Enter movie">
<button onclick="getRec()">Recommend</button>

<div id="result"></div>

<a href="/logout">Logout</a>

<script>
function getRec(){
  fetch('/add-movie',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({movie:document.getElementById('movie').value})
  })
  .then(res=>res.json())
  .then(data=>{
    document.getElementById('result').innerHTML =
      data.recommendations.join('<br>')
  })
}
</script>

</body>
</html>
